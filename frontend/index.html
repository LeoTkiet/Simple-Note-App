<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Note App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script type="module" src="/static/app.js"></script>
</head>
<body>
    <div id="auth-container" class="container">
        <h2 id="auth-title">Welcome Back</h2>

        <div id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Password">
            </div>
            <button onclick="login()">Log In</button>
        </div>

        <div id="register-form" class="hidden">
            <div class="input-group">
                <input type="email" id="register-email" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="register-password" placeholder="Password">
            </div>
            <button onclick="register()">Sign Up</button>
        </div>

        <div class="divider">or</div>

        <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            </svg>
            Continue with Google
        </button>

        <div class="toggle-text" id="toggle-to-register">
            Don't have an account? <a onclick="toggleAuth('register')">Sign up</a>
        </div>
        <div class="toggle-text hidden" id="toggle-to-login">
            Already have an account? <a onclick="toggleAuth('login')">Log in</a>
        </div>
    </div>

    <div id="app-container" class="container app-container hidden">
        <div class="header">
            <div>
                <h2>Simple Note App</h2>
                <div id="user-info" style="font-size: 13px; color: var(--text-muted); margin-top: 4px;"></div>
            </div>
            <button class="btn-logout" onclick="logout()">Log Out</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-notes" onclick="switchTab('notes')">Ghi chú</button>
            <button class="tab-btn" id="tab-confessions" onclick="switchTab('confessions')">Tâm sự</button>
        </div>

        <!-- Notes Section -->
        <div id="notes-section">
            <div class="note-input-container">
                <input type="text" id="note-content" placeholder="Type your note here..."
                    onkeypress="if(event.key === 'Enter') addNote()">
                <button onclick="addNote()">Add</button>
            </div>
            <ul id="notes-list" class="notes-list"></ul>
        </div>

        <!-- Confessions Section -->
        <div id="confessions-section" class="hidden">
            <!-- Password Setup / Verify Overlay -->
            <div id="confessions-auth">
                <h3 id="confessions-auth-title">Xác thực</h3>
                <div class="input-group">
                    <input type="password" id="confessions-password" placeholder="Nhập mật khẩu...">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="confessions-auth-btn" style="flex: 1;" onclick="submitConfessionAuth()">Xác nhận</button>
                    <button id="confessions-reset-btn" class="btn-secondary" style="flex: 1; display: none;" onclick="resetConfessionPassword()">Quên / Đổi MK</button>
                </div>
                <p id="confessions-auth-msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
            </div>

            <!-- Chat Interface -->
            <div id="confessions-chat" class="hidden">
                <div class="chat-history" id="chat-history">
                    <!-- Chat messages will appear here -->
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chat-message" placeholder="Nhập tin nhắn..."
                        onkeypress="if(event.key === 'Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()">Gửi</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
